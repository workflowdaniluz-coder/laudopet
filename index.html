<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laudo Veterinário</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f7fb;
margin:0;
padding:0;
display:flex;
justify-content:center;
}

.container{
width:700px;
background:white;
margin-top:40px;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
color:#1a73e8;
margin-bottom:5px;
}

.subtitle{
color:#777;
margin-bottom:30px;
}

.section{
margin-bottom:25px;
}

label{
font-weight:bold;
display:block;
margin-bottom:6px;
}

input, textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

textarea{
resize:vertical;
min-height:120px;
}

input[type=file]{
border:none;
}

button{
margin-top:20px;
width:100%;
padding:15px;
background:#1a73e8;
border:none;
color:white;
font-size:16px;
font-weight:bold;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#0d5bd3;
}

.footer{
margin-top:25px;
font-size:12px;
color:#999;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Laudo Veterinário</h1>
<div class="subtitle">Gerar laudo clínico com imagens</div>

<form 
action="https://n8n.srv1496054.hstgr.cloud/webhook-test/laudo-veterinaria" 
method="POST" 
target="_blank"
enctype="multipart/form-data"
>

<div class="section">
<label>Nome do Pet</label>
<input type="text" name="nome_pet" required>
</div>

<div class="section">
<label>Nome do Tutor</label>
<input type="text" name="nome_tutor" required>
</div>

<div class="section">
<label>Telefone</label>
<input type="text" name="telefone">
</div>

<div class="section">
<label>Email</label>
<input type="email" name="email">
</div>

<div class="section">
<label>Diagnóstico</label>
<textarea name="diagnostico"></textarea>
</div>

<div class="section">
<label>Imagens do exame</label>
<input type="file" name="imagens" multiple accept="image/*">
</div>

<button type="submit">
Gerar Laudo em PDF
</button>

</form>

<div class="footer">
Sistema de geração de laudos veterinários
</div>

</div>

</body>
</html>
